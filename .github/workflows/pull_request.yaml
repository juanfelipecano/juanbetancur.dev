name: Pull Request Verification

on:
  workflow_dispatch:
  pull_request:
    types: [ opened, synchronize, reopened ]

env:
  NODE_VERSION: '26'
  COVERAGE_FILE_PATH: './coverage/juanbetancur.dev/clover.xml'

jobs:
  validation:
    name: Build and Test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      # - Download the repository code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # - Provision Node.js environment
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # - Dependency installation
      - name: Install Application Dependencies
        run: npm ci

      # - Execute Unit Tests in Headless Mode
      - name: Run Unit Tests
        run: npm run test -- --coverage --watch=false

      # - Post code coverage results as comments on the pull request
      - name: Post Code Coverage Comments
        if: github.event_name == 'pull_request'
        uses: kcjpop/coverage-comments@v2.2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          coverage-file: ${{ env.COVERAGE_FILE_PATH }}

      # - Compile production-ready code bundles
      - name: Compile Production Build
        run: npm run build -- --configuration production

      # - Install Firebase Tools CLI globally on the runner
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # - Deploy to Firebase Hosting Channel for previewing changes
      - name: Deploy to Firebase Hosting as Preview
        id: deployment
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          PREVIEW_URL=$(firebase hosting:channel:deploy testing-${{ github.run_id }} --expires 1d --json | jq -r '.result[].url')
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      # - Add the preview URL to the workflow summary for easy access
      - name: Add URL to summary
        run: |
          echo "## 🚀 Preview Available" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.deployment.outputs.preview_url }}" >> "$GITHUB_STEP_SUMMARY"

      # - Post the preview URL as a comment on the pull request
      - name: Comment on Pull Request with Preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 Preview Available: [Testing Preview](${{ steps.deployment.outputs.preview_url }})
                This preview will expire in 24 hours.
              `
            })
