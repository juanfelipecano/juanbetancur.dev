name: Pull Request Verification

on:
  workflow_dispatch:
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  validation:
    name: Build and Test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      # Step 1: Download the repository code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Provision Node.js environment
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: 'npm'

      # Step 3: Dependency installation
      - name: Install Application Dependencies
        run: npm ci

      # Step 4: Run Static Code Analysis
      # - name: Execute Code Linting
      #   run: npm run lint --if-present

      # Step 5: Execute Test Suites in Headless Mode
      # - name: Run Unit Tests
      #   run: npm run test -- --watch=false --browsers=ChromeHeadless

      # Step 6: Compile production-ready code bundles
      - name: Compile Production Build
        run: npm run build -- --configuration production

      # Step 7: Install Firebase Tools CLI globally on the runner
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Step 8: Deploy to Firebase Hosting
      - name: Deploy to Firebase Hosting as Preview
        id: deployment
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          PREVIEW_URL=$(firebase hosting:channel:deploy testing-${{ github.run_id }} --expires 1d --json | jq -r '.result[].url')
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      # Step 9: Add the preview URL to the workflow summary for easy access
      - name: Add URL to summary
        run: |
          echo "## 🚀 Preview disponible" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.deployment.outputs.preview_url }}" >> "$GITHUB_STEP_SUMMARY"

      # Step 10: Post the preview URL as a comment on the pull request
      - name: Comment on Pull Request with Preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 Preview disponible: [Testing Preview](${{ steps.deployment.outputs.preview_url }})
                This preview will expire in 24 hours.
              `
            })
