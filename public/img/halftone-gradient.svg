<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14110f" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#14110f" stop-opacity="0"></stop>
    </linearGradient>
    <pattern id="dotsH" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2.5" fill="#14110f"></circle>
    </pattern>
    <mask id="lgmask"><rect width="800" height="400" fill="url(#lg)"></rect></mask>
  </defs>
  <rect width="800" height="400" fill="url(#dotsH)" mask="url(#lgmask)"></rect>
</svg>