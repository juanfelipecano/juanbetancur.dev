<section class="contact page-sections" id="contact">
    <div class="contact__inner">
        <div class="contact__eyebrow">{{ 'contact.eyebrow' | translate }}</div>
        <div class="contact__grid">
            <div class="contact__content">
                <h3>{{ 'contact.title' | translate }}</h3>
                <p>
                    {{ 'contact.description' | translate }}
                </p>
                <p class="contact__email-wrapper">
                    <a class="contact__email" href="mailto:juanfelipebetancurcano@proton.me">juanfelipebetancurcano@proton.me</a>
                </p>
                <div class="contact__socials">
                    <a
                        href="https://github.com/juanfelipecano"
                        target="_blank"
                        rel="noopener">
                        {{ 'contact.socials.github' | translate }}<span class="arr">↗</span>
                    </a>
                    <a
                        href="https://linkedin.com/in/juanfelipebetancurcano"
                        target="_blank"
                        rel="noopener">
                        {{ 'contact.socials.linkedin' | translate }}<span class="arr">↗</span>
                    </a>
                    <a
                        href="https://github.com/juanfelipecano"
                        target="_blank"
                        rel="noopener">
                        {{ 'contact.socials.readcv' | translate }}<span class="arr">↗</span>
                    </a>
                </div>
            </div>
            <form class="contact__form" [formGroup]="form" (ngSubmit)="submit()">
                <div class="contact__form-group">
                    <label for="name">{{ 'contact.form.name.label' | translate }}</label>
                    <input id="name" type="text" formControlName="name" [placeholder]="'contact.form.name.placeholder' | translate" />
                </div>
                <div class="contact__form-group">
                    <label for="email">{{ 'contact.form.email.label' | translate }}</label>
                    <input id="email" type="email" formControlName="email" [placeholder]="'contact.form.email.placeholder' | translate" />
                </div>
                <div class="contact__form-group">
                    <label for="message">{{ 'contact.form.message.label' | translate }}</label>
                    <textarea id="message" formControlName="message" [placeholder]="'contact.form.message.placeholder' | translate"></textarea>
                </div>

                <div class="contact__form__actions">
                    <button class="btn" type="submit" [disabled]="form.invalid || sent()">
                        @if (sent()) {
                            {{ 'contact.form.actions.sent' | translate }}
                        } @else {
                            {{ 'contact.form.actions.send' | translate }}
                        }
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
