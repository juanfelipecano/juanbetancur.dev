<header class="header">
    <div class="header__inner">
        <button type="button" class="header__brand" (click)="scrollToSection('top')">
            <span class="header__brand__logo">{{ 'header.logo.brand' | translate }}</span>
            <span class="header__brand__name">
                {{ 'header.logo.name' | translate }}<span class="header__brand__accent">{{ 'header.logo.accent' | translate }}</span>
            </span>
        </button>

        <button
            type="button"
            class="header__menu-toggle"
            [attr.aria-label]="'header.menu.label' | translate"
            aria-controls="header-menu"
            [attr.aria-expanded]="!isMenuClosed()"
            (click)="toggleMenu()">
            <span>
                @if (isMenuClosed()) {
                    {{ 'header.menu.open' | translate }}
                } @else {
                    {{ 'header.menu.close' | translate }}
                }
            </span>
        </button>

        <div id="header-menu" class="header__end" [class.open]="!isMenuClosed()">
            <nav [attr.aria-label]="'header.nav-label' | translate">
                <button type="button" class="header__work" (click)="scrollToSection('work')">{{ 'header.links.work' | translate }}</button>
                <button type="button" class="header__about" (click)="scrollToSection('about')">{{ 'header.links.about' | translate }}</button>
                <button type="button" class="header__contact" (click)="scrollToSection('contact')">{{ 'header.links.contact' | translate }}</button>
            </nav>
            <div class="header__end__right">
                <a href="https://github.com/juanfelipecano" target="_blank" rel="noopener">{{ 'header.external-links.github' | translate }}</a>
                <a href="mailto:juanfelipebetancurcano@proton.me">{{ 'header.external-links.email' | translate }}</a>
                <button
                    type="button"
                    class="header__lang-toggle"
                    (click)="toggleLanguage()"
                    [attr.aria-label]="(currentLang() === 'en' ? 'header.language.switch-to-es' : 'header.language.switch-to-en') | translate"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="m5 8 6 6" />
                        <path d="m4 14 6-6 2-3" />
                        <path d="M2 5h12" />
                        <path d="M7 2h1" />
                        <path d="m22 22-5-10-5 10" />
                        <path d="M14 18h6" />
                    </svg>
                    <span aria-hidden="true">{{ currentLang() === 'en' ? 'ES' : 'EN' }}</span>
                </button>
            </div>
        </div>
    </div>
</header>
