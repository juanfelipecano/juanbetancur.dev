<header class="header">
    <div class="header__inner">
        <a class="header__brand" href="#top">
            <span class="header__brand__logo">jb</span>
            <span class="header__brand__name"
                >juanbetancur<span class="header__brand__accent">.dev</span></span
            >
        </a>

        <button class="header__menu-toggle" aria-label="Toggle menu" (click)="toggleMenu()">
            <span>
                @if (isMenuClosed()) {
                    menu
                } @else {
                    close x
                }
            </span>
        </button>

        <div class="header__end" [class.open]="!isMenuClosed()">
            <nav>
                <a class="header__work">Work</a>
                <a class="header__about">About</a>
                <a class="header__notes">Notes</a>
                <a class="header__contact">Contact</a>
            </nav>
            <div class="header__end__right">
                <a href="https://github.com/juanfelipecano" target="_blank" rel="noopener"
                    >github ↗</a
                >
                <a href="mailto:hello@juanbetancur.dev">email ↗</a>
            </div>
        </div>
    </div>
</header>
